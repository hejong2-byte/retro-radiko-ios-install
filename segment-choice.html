<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Retro Radiko Segment Choice</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #000808;
      --panel: #001112;
      --line: rgba(0, 220, 245, .55);
      --text: #e6ffff;
      --sub: #9ed9dc;
      --cyan: #2ee5ff;
      --yellow: #ffe129;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 35% 0%, #052022 0, var(--bg) 42%, #000 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      letter-spacing: 0;
    }
    main {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 14px 32px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 7vw, 42px);
      line-height: 1.02;
    }
    p {
      margin: 0 0 12px;
      color: var(--sub);
      font-size: 15px;
      line-height: 1.45;
    }
    .notice {
      margin: 14px 0 18px;
      padding: 11px 12px;
      border: 1px solid rgba(255, 225, 41, .45);
      border-radius: 8px;
      background: rgba(255, 225, 41, .08);
      color: #fff5a8;
      font-weight: 700;
      font-size: 14px;
    }
    .preview {
      display: block;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #000;
      box-shadow: 0 0 24px rgba(0, 220, 245, .12);
    }
    .choices {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }
    .choice {
      min-height: 86px;
      padding: 12px 10px;
      border: 1px solid rgba(0, 220, 245, .38);
      border-radius: 8px;
      background: rgba(0, 16, 18, .88);
    }
    .choice b {
      display: block;
      margin-bottom: 6px;
      color: var(--cyan);
      font-size: 22px;
    }
    .choice span {
      display: block;
      color: var(--text);
      font-size: 14px;
      line-height: 1.35;
    }
    .meta {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(0, 220, 245, .22);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      color: #87cbd0;
      overflow-wrap: anywhere;
    }
    @media (max-width: 520px) {
      main { padding-left: 10px; padding-right: 10px; }
      .choices { grid-template-columns: 1fr; }
      .choice { min-height: 0; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Segment Choice</h1>
    <p>1422 표시에서 14가 작아 보이는 문제를 비교하는 승인용 페이지입니다. 숫자 그룹 기울기는 기존 그대로 유지했습니다.</p>
    <div class="notice">이 페이지는 프리뷰 전용입니다. 사용자 승인 전까지 앱 빌드/설치 링크에 반영하지 않습니다.</div>
    <a href="segment-balance-variants-tilt.png">
      <img class="preview" src="segment-balance-variants-tilt.png" alt="A/B/C segment balance preview">
    </a>
    <section class="choices" aria-label="Choices">
      <div class="choice"><b>A</b><span>원본 유지. 변화 없음.</span></div>
      <div class="choice"><b>B</b><span>중간 보정. 현재 로컬 앱 후보.</span></div>
      <div class="choice"><b>C</b><span>강한 보정. 14 윤곽이 더 살아남.</span></div>
    </section>
    <div class="meta">
      Preview image: segment-balance-variants-tilt.png<br>
      App build status: not published from this choice page.
    </div>
  </main>
</body>
</html>
